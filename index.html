    <title>Rellim Kid Kare Konnect | Connecting Daycares With Qualified Childcare Professionals</title>
    <meta name="description" content="A childcare staffing platform helping Georgia daycares connect with qualified teachers, assistants, and childcare professionals." />

    <meta property="og:title" content="Rellim Kid Kare Konnect | Connecting Daycares With Qualified Childcare Professionals" />
    <meta property="og:description" content="A childcare staffing platform helping Georgia daycares connect with qualified teachers, assistants, and childcare professionals." />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ================================================================
         LIVE CHAT WIDGET (THIRD-PARTY)
         ----------------------------------------------------------------
         Paste your provider's install snippet between the BEGIN and END
         markers below. As soon as the provider's script loads, the
         built-in offline chat bubble detects it and steps aside, so
         users only see one chat widget.

         TAWK.TO  (free) — https://dashboard.tawk.to
           <script>
           var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
           (function(){
             var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
             s1.async=true;
             s1.src='https://embed.tawk.to/YOUR_PROPERTY_ID/default';
             s1.charset='UTF-8';
             s1.setAttribute('crossorigin','*');
             s0.parentNode.insertBefore(s1,s0);
           })();
           </script>

         TIDIO  (free tier) — https://www.tidio.com
           <script src="//code.tidio.co/YOUR_PUBLIC_KEY.js" async></script>

         CRISP  (free tier) — https://crisp.chat
           <script>
             window.$crisp=[];window.CRISP_WEBSITE_ID="YOUR_WEBSITE_ID";
             (function(){var d=document,s=d.createElement("script");
             s.src="https://client.crisp.chat/l.js";s.async=1;
             d.getElementsByTagName("head")[0].appendChild(s);})();
           </script>

         HUBSPOT — https://app.hubspot.com (Service > Chatflows)
           <script type="text/javascript" id="hs-script-loader" async defer
             src="//js.hs-scripts.com/YOUR_HUB_ID.js"></script>

         INTERCOM — https://app.intercom.com
         LIVECHAT — https://www.livechat.com
         ZENDESK CHAT — https://www.zendesk.com
         ================================================================ -->
    <!-- BEGIN LIVE CHAT WIDGET -->
    <script type="text/javascript">
      window.$crisp = [];
      window.CRISP_WEBSITE_ID = "040724fd-fcc6-4130-9b7f-5b1cf60639db";
      (function () {
        var d = document;
        var s = d.createElement("script");
        s.src = "https://client.crisp.chat/l.js";
        s.async = 1;
        d.getElementsByTagName("head")[0].appendChild(s);
      })();

      // (Brand session data — business_name, support_email, support_phone —
      // is pushed from React using the values in src/config.js so there's
      // only one place to change them. See App.jsx for the $crisp.push.)

      // Fallback welcome shown the first time a visitor opens the chat
      // in a session, in case the dashboard welcome isn't configured yet.
      window.$crisp.push(["on", "chat:opened", function () {
        try {
          if (window.__rkkk_welcomed) return;
          window.__rkkk_welcomed = true;
          window.$crisp.push(["do", "message:show", ["text",
            "Welcome to Rellim Kid Kare Konnect Support. How may we help you today?"
          ]]);
        } catch (e) {}
      }]);
    </script>
    <!-- END LIVE CHAT WIDGET -->
  </body>
</html>
